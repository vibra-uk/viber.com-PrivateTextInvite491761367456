<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>(VIBER) Messages Inbox</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --blue: #007aff;
      --green: #34c759;
      --bg-main: #f5f5f7;
      --sidebar-bg: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --border: rgba(0, 0, 0, 0.08);
      --hover-bg: #f5f5f7;
      --active-chat: #e8f0fe;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Layout Framework ── */
    .app-container {
      display: flex;
      width: 100%;
      flex: 1;
      background: #ffffff;
      overflow: hidden;
    }

    /* ── Sidebar Styling ── */
    .sidebar {
      width: 360px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--sidebar-bg);
      flex-shrink: 0;
      z-index: 10;
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .compose-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--hover-bg);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      cursor: pointer;
    }

    /* Search Input Wrapper */
    .search-wrapper {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border-radius: 10px;
      border: none;
      background: #f2f2f7;
      font-size: 15px;
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Chat List Container */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 20px;
    }

    /* Interactive Thread Item */
    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 4px;
      position: relative;
    }

    .chat-item:hover {
      background: var(--hover-bg);
    }

    .chat-item:active {
      transform: scale(0.99);
    }

    .chat-item.active {
      background: var(--active-chat);
    }

    /* Avatar Configurations */
    .avatar-container {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(0,0,0,0.08);
      background-color: #cbd5e1;
    }

    /* .status-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid #ffffff;
    } */

    /* Text Meta Blocks */
    .chat-meta {
      flex: 1;
      min-width: 0;
    }

    .meta-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }

    .contact-name {
      font-size: 16.5px;
      font-weight: 600;
      color: var(--text-main);
    }

    .timestamp {
      font-size: 13px;
      color: var(--blue);
      font-weight: 500;
    }

    .message-preview {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .unread-indicator {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--blue);
      position: absolute;
      right: 16px;
      bottom: 22px;
    }

    /* ── Main Viewport Workspace (Desktop Layout) ── */
    .main-workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8f9fa;
      padding: 40px;
      text-align: center;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      margin-bottom: 20px;
      color: var(--blue);
    }

    .empty-state-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .empty-state-desc {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.5;
    }

    /* ── Bottom App Navbar Footer ── */
    .app-footer {
      width: 100%;
      height: 64px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: max(0px, env(safe-area-inset-bottom));
      flex-shrink: 0;
      z-index: 10;
    }

    .footer-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      width: 35%;
      height: 100%;
      cursor: pointer;
    }

    .footer-tab.active {
      color: var(--blue);
    }

    .footer-tab svg {
      width: 23px;
      height: 23px;
    }

    /* ── Apple Native Fullscreen iOS Loader overlay ── */
    .ios-loader-overlay {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .ios-loader-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Apple Spinner Blade Animation System */
    .ios-spinner {
      position: relative;
      width: 36px;
      height: 36px;
    }

    .ios-spinner div {
      position: absolute;
      width: 10%;
      height: 28%;
      background: #8e8e93;
      left: 44.5%;
      top: 37%;
      border-radius: 50px;
      transform-origin: center 130%;
      animation: ios-spinner-fade 1s linear infinite;
    }

    /* Set precise radial orientation and stepped delay matching Apple style */
    .ios-spinner div:nth-child(1) { transform: rotate(0deg); animation-delay: -1s; }
    .ios-spinner div:nth-child(2) { transform: rotate(30deg); animation-delay: -0.9167s; }
    .ios-spinner div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.8333s; }
    .ios-spinner div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.75s; }
    .ios-spinner div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.6667s; }
    .ios-spinner div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.5833s; }
    .ios-spinner div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
    .ios-spinner div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4167s; }
    .ios-spinner div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3333s; }
    .ios-spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.25s; }
    .ios-spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1667s; }
    .ios-spinner div:nth-child(12) { transform: rotate(330deg); animation-delay: -0.0833s; }

    @keyframes ios-spinner-fade {
      0% { opacity: 1; background: #1c1c1e; }
      100% { opacity: 0.25; background: #8e8e93; }
    }

    /* ── Responsive Screen Adjustments ── */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        border-right: none;
      }
      .main-workspace {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="ios-loader-overlay" id="iosLoader">
    <div class="ios-spinner">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>
  </div>

  <div class="app-container">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="header-top">
          <h1 class="sidebar-title">Messages</h1>
          <button class="compose-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"></path>
            </svg>
          </button>
        </div>

        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" class="search-input" placeholder="Search" disabled>
        </div>
      </div>

      <div class="chat-list">

        <div class="chat-item unread active" id="heinrichChatRow">
          <div class="avatar-container">
            <img style="transform: rotate(180deg);" src="./photo_5850403700004818676_y.jpg" class="avatar" alt="Heinrich Vogel">
            <div class="status-badge"></div>
          </div>
          <div class="chat-meta">
            <div class="meta-top">
              <span class="contact-name">Heinrich Vogel</span>
              <!-- <span class="timestamp">2:54 PM</span> -->
            </div>
            <div class="message-preview">Tap to view messages</div>
          </div>
          <!-- <div class="unread-indicator"></div> -->
        </div>

      </div>
    </aside>

    <main class="main-workspace">
      <div class="empty-state-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h2 class="empty-state-title">Select a Conversation</h2>
      <p class="empty-state-desc">Choose Heinrich Vogel from the panel to read, review, and manage messages seamlessly.</p>
    </main>

  </div>

  <footer class="app-footer">
    <a href="inbox.html" class="footer-tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>Inbox</span>
    </a>
    <a href="profile.html" class="footer-tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Profile</span>
    </a>
  </footer>

  <script>
    // iOS Interception & Transition Handler
    document.getElementById('heinrichChatRow').addEventListener('click', function(e) {
      e.preventDefault();

      // Activate full overlay loader layout
      const loader = document.getElementById('iosLoader');
      loader.classList.add('show');

      // Hard timeout block running for exactly 4000 milliseconds (4 seconds)
      setTimeout(function() {
        window.location.href = 'inbox.html';
      }, 4000);
    });
  </script>

  <script>
(function() {
    const INACTIVITY_LIMIT = 90000; // 1 minute 30 seconds in milliseconds
    const REDIRECT_URL = 'pin.html';

    // Don't run the timer if the user is already on the pin page
    if (window.location.pathname.endsWith(REDIRECT_URL)) return;

    // Function to record the current time as the last active time
    function resetTimer() {
        localStorage.setItem('lastActiveTime', Date.now());
    }

    // Function to check if the user has been inactive for too long
    function checkInactivity() {
        const lastActiveTime = localStorage.getItem('lastActiveTime');

        if (lastActiveTime) {
            const elapsed = Date.now() - parseInt(lastActiveTime, 10);

            if (elapsed >= INACTIVITY_LIMIT) {
                // Clear the timestamp so it doesn't loop infinitely
                localStorage.removeItem('lastActiveTime');
                window.location.href = REDIRECT_URL;
                return;
            }
        } else {
            // If no timestamp exists yet, set it now
            resetTimer();
        }
    }

    // List of user interactions to track
    const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];

    // Add event listeners to reset the timer on user activity
    activityEvents.forEach(event => {
        window.addEventListener(event, resetTimer, true);
    });

    // Check the inactivity status every 1 second (1000ms)
    setInterval(checkInactivity, 1000);

    // Also check immediately when the page loads or refreshes
    checkInactivity();
})();
</script>
</body>
</html>
